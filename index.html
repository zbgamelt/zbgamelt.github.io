<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            color: #856404;
        }
        .notice a { color: #856404; font-weight: bold; }
        .giscus-wrapper {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 0.9em;
        }
        .footer a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗣️ 我的论坛</h1>
        <p>基于 Giscus + GitHub Discussions 构建</p>
    </div>
    
    <div class="container">
        <div class="notice">
            💡 提示：发言需要登录 GitHub 账号。没有账号？<a href="https://github.com/signup" target="_blank">免费注册</a>
        </div>
        
        <div class="giscus-wrapper">
            <script src="https://giscus.app/client.js"
                data-repo="zbgamelt/zbgamelt.github.io"
                data-repo-id="R_kgDOTF244A"
                data-category="General"
                data-category-id="DIC_kwDOTF244M4C_7cw"
                data-mapping="title"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="top"
                data-theme="preferred_color_scheme"
                data-lang="zh-CN"
                data-loading="lazy"
                crossorigin="anonymous"
                async>
            </script>
        </div>
    </div>
    
    <div class="footer">
        <p>Powered by <a href="https://giscus.app" target="_blank">Giscus</a> & <a href="https://github.com" target="_blank">GitHub Discussions</a></p>
    </div>
</body>
</html>
